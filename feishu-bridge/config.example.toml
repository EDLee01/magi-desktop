# Copy to config.local.toml and fill in secrets (never commit config.local.toml).

[feishu]
app_id = "cli_xxxxxxxx"
app_secret = "YOUR_APP_SECRET"

[router]
# Router Magi on the Mac mini (magi serve)
base_url = "http://127.0.0.1:8765"
# From `magi pair feishu-bridge` on the router host:
device_id = ""
token = ""

[security]
# Feishu open_id values allowed to control the cluster (empty = reject all).
allowed_user_ids = []
# Chat IDs (group) optionally allowed; leave empty to only allow DMs from allowed users.
allowed_chat_ids = []

[magi]
default_model = "main"
job_timeout_seconds = 600
# yolo / fullAccess = bypassPermissions (no approval UI; required for Feishu headless)
# Router (~/.magi-router/config.yaml) should set:
#   control.defaultCwd = your home dir, allowAnyCwd = true, denyDestructive = true
# Feishu keeps permission_mode = yolo for read/write; deletes are denied by router.
permission_mode = "yolo"
# client = forward AskUserQuestion to Feishu; auto = pick defaults in yolo mode
interaction_mode = "client"
interaction_timeout_seconds = 300
response_language = "auto"
# Optional override of router control.defaultCwd (leave unset to use router default)
# cwd = "/Users/edward/projects/magi"
persist_sessions = true
session_ttl_seconds = 86400

[[peers.manual]]
name = "research"
url = "http://127.0.0.1:8766"
role = "research"

[[peers.manual]]
name = "agent"
url = "http://127.0.0.1:8767"
role = "agent"

[[peers.manual]]
name = "skill"
url = "http://127.0.0.1:8768"
role = "skill"
