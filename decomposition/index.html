<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magi Agent 全功能思维导图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', monospace;
  background: #0d1117;
  color: #c9d1d9;
  height: 100vh;
  overflow: hidden;
}
#app { display: flex; height: 100vh; }
#sidebar {
  width: 300px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#sidebar header {
  padding: 16px;
  border-bottom: 1px solid #30363d;
}
#sidebar h1 { font-size: 16px; color: #58a6ff; }
#sidebar .subtitle { font-size: 11px; color: #8b949e; margin-top: 4px; }
#search-box { padding: 12px 16px; border-bottom: 1px solid #30363d; }
#search-box input {
  width: 100%;
  padding: 6px 10px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  font-size: 12px;
  outline: none;
}
#search-box input:focus { border-color: #58a6ff; }
#nav-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 13px;
  border-left: 3px solid transparent;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-item:hover { background: #1f2937; }
.nav-item.active { background: #1f2937; color: #fff; }
.nav-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.nav-count { margin-left: auto; font-size: 10px; color: #8b949e; }
#stats {
  padding: 10px 16px;
  font-size: 11px;
  color: #8b949e;
  border-top: 1px solid #30363d;
  background: #0d1117;
}
#main { flex: 1; overflow: auto; padding: 24px 32px; }
#main header {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid #30363d;
}
#main h2 { font-size: 24px; display: flex; align-items: center; gap: 12px; }
#main .module-summary {
  margin-top: 8px;
  color: #8b949e;
  font-size: 13px;
  line-height: 1.6;
  max-width: 900px;
}
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
.toolbar button {
  padding: 4px 12px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  font-size: 12px;
  cursor: pointer;
}
.toolbar button:hover { background: #30363d; }
/* Tree */
.tree, .tree ul { list-style: none; padding: 0; margin: 0; }
.tree ul {
  padding-left: 22px;
  margin-left: 8px;
  border-left: 1px dashed #30363d;
}
.tree li { padding: 3px 0; position: relative; }
.tree li > .node-row::before {
  content: '';
  position: absolute;
  left: -14px;
  top: 14px;
  width: 12px;
  height: 1px;
  background: #30363d;
}
.tree > li > .node-row::before { display: none; }
.node-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.node-row:hover { background: #1f2937; }
.node-row.highlight { background: #1f4a8b !important; }
.toggle {
  display: inline-block;
  width: 14px;
  height: 18px;
  font-size: 10px;
  color: #8b949e;
  text-align: center;
  flex-shrink: 0;
  user-select: none;
  line-height: 18px;
}
.toggle.empty { visibility: hidden; }
.toggle.open::before { content: '▼'; }
.toggle.closed::before { content: '▶'; }
.node-icon {
  font-size: 13px;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  line-height: 18px;
}
.node-content { flex: 1; min-width: 0; }
.node-label {
  font-weight: 600;
  font-size: 13px;
  color: #c9d1d9;
  line-height: 18px;
}
.node-label code {
  background: #0d1117;
  padding: 1px 6px;
  border-radius: 3px;
  color: #79c0ff;
  font-size: 12px;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
}
.node-desc {
  color: #8b949e;
  font-size: 11px;
  margin-top: 2px;
  font-weight: 400;
  line-height: 1.5;
}
.node-tag {
  display: inline-block;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #21262d;
  color: #8b949e;
  margin-left: 4px;
  vertical-align: middle;
  font-weight: 600;
  text-transform: uppercase;
}
.tag-fn { background: #2d4a2d; color: #7ee787; }
.tag-class { background: #4a3a2d; color: #ffa657; }
.tag-data { background: #2d3a4a; color: #79c0ff; }
.tag-flow { background: #4a2d4a; color: #d2a8ff; }
.tag-tool { background: #2d4a4a; color: #56d4dd; }
.tag-state { background: #3a3a2d; color: #ffd166; }
ul.collapsed { display: none; }
/* Highlight per module */
li[data-module="cli"] > .node-row .node-icon { color: #f97583; }
li[data-module="loop"] > .node-row .node-icon { color: #79c0ff; }
li[data-module="tools"] > .node-row .node-icon { color: #7ee787; }
li[data-module="provider"] > .node-row .node-icon { color: #d2a8ff; }
li[data-module="memory"] > .node-row .node-icon { color: #ffa657; }
li[data-module="session"] > .node-row .node-icon { color: #56d4dd; }
li[data-module="mcp"] > .node-row .node-icon { color: #ff7b72; }
li[data-module="tui"] > .node-row .node-icon { color: #d4a5ff; }
li[data-module="agent"] > .node-row .node-icon { color: #a5d6ff; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #0d1117; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }
.depth-indicator {
  position: absolute;
  right: 16px;
  top: 16px;
  background: #161b22;
  border: 1px solid #30363d;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 11px;
  color: #8b949e;
}
@media (max-width: 768px) {
  #sidebar { width: 100%; max-height: 200px; position: absolute; z-index: 10; }
  #main { padding: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <header>
      <h1>Magi Agent 思维导图</h1>
      <div class="subtitle">legacy magi-agent 全功能拆解</div>
    </header>
    <div id="search-box"><input type="text" id="search" placeholder="搜索节点..."></div>
    <div id="nav-list"></div>
    <div id="stats"></div>
  </div>
  <div id="main">
    <header>
      <h2 id="title"></h2>
      <div class="module-summary" id="summary"></div>
    </header>
    <div class="toolbar">
      <button onclick="expandAll()">展开全部</button>
      <button onclick="collapseAll()">折叠全部</button>
      <button onclick="expandToDepth(2)">展开到 L2</button>
      <button onclick="expandToDepth(3)">展开到 L3</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<script src="data-loop.js"></script>
<script src="data-tools.js"></script>
<script src="data-prov-mem.js"></script>
<script src="data-sess-mcp.js"></script>
<script src="data-tui-agent.js"></script>
<script src="data.js"></script>
<script src="render.js"></script>
</body>
</html>
